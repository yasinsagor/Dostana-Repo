<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="/Dostana-Repo/manifest.json">
  <link rel="apple-touch-icon" href="/Dostana-Repo/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dostana">
  <meta name="theme-color" content="#D4890A">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#D4890A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dostana Manager v40 daily submissions and Ryki date fix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#F7F3EE;
  --card:#FFFFFF;
  --card2:#FAF6F0;
  --border:#E4D9C8;
  --border-light:#EDE5D8;
  --primary:#C97E08;
  --primary-l:#E8980F;
  --primary-dark:#A56506;
  --primary-bg:#FEF4E0;
  --primary-glow:rgba(201,126,8,0.15);
  --text:#18100A;
  --dim:#8A7060;
  --sep:#EAE0CC;
  --g:#1E7A2A;--gl:#27A337;
  --r:#B71C1C;--rl:#D32F2F;
  --b:#1A55A8;--bl:#1E6BC4;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-md:0 8px 24px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.14),0 8px 16px rgba(0,0,0,0.08);
  --radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:20px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}
.page{display:none;min-height:100vh;flex-direction:column;}.page.active{display:flex;}

/* ── SPLASH ────────────────────────────────────── */
#pg-splash{
  background:linear-gradient(160deg,#1A0D02 0%,#3A2006 40%,#2A1504 70%,#0E0701 100%);
  align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:32px;
  position:relative;overflow:hidden;
}
#pg-splash::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 50% 40%,rgba(201,126,8,0.12) 0%,transparent 60%);
  pointer-events:none;
}
.slogo{width:140px;height:140px;margin:0 auto 24px;filter:drop-shadow(0 8px 32px rgba(201,126,8,0.4));position:relative;}
.slogo img{width:140px;height:140px;object-fit:contain;}
.sbrand{font-size:30px;font-weight:900;color:#F5A623;letter-spacing:4px;font-family:'Inter',sans-serif;}
.ssub{color:rgba(245,166,35,0.5);font-size:10px;margin-top:6px;letter-spacing:5px;text-transform:uppercase;}
.sline{width:40px;height:2px;background:linear-gradient(90deg,transparent,#F5A623,transparent);margin:18px auto;border-radius:2px;}
.shint{color:rgba(245,166,35,0.35);font-size:11px;animation:blink 2s ease-in-out infinite;margin-top:8px;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.8}}

/* ── TOPBAR ────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#FFFFFF;
  border-bottom:1px solid var(--border-light);
  position:sticky;top:0;z-index:99;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.tl{display:flex;align-items:center;gap:10px;}
.tlogo{width:36px;height:36px;border-radius:10px;overflow:hidden;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
.tlogo img{width:32px;height:32px;object-fit:contain;}
.ttitle{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.tsub{font-size:10px;color:var(--dim);font-weight:500;margin-top:1px;}
.ibtn{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border-light);color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ibtn:active{background:var(--border);transform:scale(0.94);}
.lang-btn{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:800;font-size:11px;letter-spacing:.5px;}
.tbtns{display:flex;gap:6px;}
.content{padding:16px;flex:1;overflow-y:auto;}

/* ── LOGIN ─────────────────────────────────────── */
#pg-login{background:linear-gradient(180deg,#FFFBF4 0%,var(--bg) 100%);}
.ltop{text-align:center;padding:36px 24px 20px;}
.llogo{width:100px;height:100px;display:inline-flex;align-items:center;justify-content:center;}
.llogo img{width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 6px 20px rgba(201,126,8,0.25));}
.lbrand{font-size:22px;font-weight:900;color:var(--primary);margin-top:14px;letter-spacing:1px;}
.lsub{color:var(--dim);font-size:12px;margin-top:4px;font-weight:500;}
.lbody{padding:0 20px 32px;flex:1;}
.lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block;}

/* ── INPUTS ────────────────────────────────────── */
.inp{
  width:100%;background:#FFFFFF;border:1.5px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:'Inter',inherit;
  font-size:14px;padding:12px 14px;outline:none;margin-bottom:10px;
  box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow),var(--shadow-sm);}
select.inp option{background:#fff;}
textarea.inp{resize:none;}
input[type=date].inp{color-scheme:light;}
.fg{margin-bottom:10px;}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── DATE BANNER ───────────────────────────────── */
.date-banner{
  background:linear-gradient(135deg,#FFFBF0,var(--primary-bg));
  border:1.5px solid rgba(201,126,8,0.25);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.date-banner-icon{font-size:18px;}
.date-banner-text{flex:1;font-size:12px;font-weight:700;color:var(--primary);}
.date-banner-input{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;color-scheme:light;transition:border-color .2s;}
.date-banner-input:focus{border-color:var(--primary);}

/* ── PIN PAD ───────────────────────────────────── */
.pdots{display:flex;gap:14px;justify-content:center;margin-bottom:4px;}
.dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:all .2s;}
.dot.on{background:var(--primary);box-shadow:0 0 0 4px var(--primary-glow);}
.pwrap{background:#fff;border:1.5px solid var(--border-light);border-radius:var(--radius-lg);padding:16px 14px;text-align:center;margin-bottom:10px;box-shadow:var(--shadow);}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.pkey{
  background:#FFFFFF;border:1.5px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:'Inter',inherit;font-size:24px;font-weight:700;
  padding:17px 0;cursor:pointer;box-shadow:var(--shadow-sm);transition:all .12s;
}
.pkey:active{background:var(--primary);border-color:var(--primary);color:#fff;transform:scale(0.93);box-shadow:none;}
.perr{color:var(--r);text-align:center;font-size:12px;margin-bottom:8px;display:none;font-weight:600;}

/* ── BUTTONS ───────────────────────────────────── */
.btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-family:'Inter',inherit;font-size:14px;font-weight:700;
  cursor:pointer;margin-bottom:8px;transition:all .15s;letter-spacing:.1px;
}
.btn-o{
  background:linear-gradient(135deg,var(--primary-l),var(--primary));
  color:#fff;box-shadow:0 4px 14px rgba(201,126,8,0.35);
}
.btn-o:active{background:var(--primary-dark);box-shadow:none;transform:translateY(1px);}
.btn-g{
  background:linear-gradient(135deg,var(--gl),var(--g));
  color:#fff;box-shadow:0 4px 14px rgba(30,122,42,0.3);
}
.btn-g:active{opacity:.85;transform:translateY(1px);}
.btn-out{background:#fff;color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow-sm);}
.btn-out:active{background:var(--card2);}

/* ── OWNER TABS ────────────────────────────────── */
.otabs{
  display:flex;background:#fff;border-radius:14px;padding:4px;
  margin-bottom:14px;gap:3px;overflow-x:auto;
  box-shadow:var(--shadow);border:1px solid var(--border-light);
  scrollbar-width:none;
}
.otabs::-webkit-scrollbar{display:none;}
.otab{
  flex:1;min-width:55px;padding:9px 5px;text-align:center;
  font-size:11px;font-weight:700;border-radius:10px;cursor:pointer;
  color:var(--dim);white-space:nowrap;transition:all .15s;letter-spacing:.1px;
}
.otab.active{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(201,126,8,0.3);}

/* ── MANAGER TABS ──────────────────────────────── */
.mtabs{
  display:flex;background:#FFFFFF;
  border-bottom:1px solid var(--border-light);
  padding:0 14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.mtab{
  flex:1;padding:13px 6px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--dim);border-bottom:2.5px solid transparent;
  margin-bottom:-1px;transition:all .15s;letter-spacing:.1px;
}
.mtab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* ── SECTION CARDS ─────────────────────────────── */
.sec{
  background:#fff;border-radius:var(--radius-lg);
  border:1px solid var(--border-light);margin-bottom:12px;
  overflow:hidden;box-shadow:var(--shadow-sm);
}
.sh{
  padding:12px 14px;
  background:linear-gradient(135deg,#FFFBF2,var(--primary-bg));
  font-weight:800;font-size:12px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(201,126,8,0.15);color:var(--primary);
  letter-spacing:.2px;
}
.sb{padding:14px;}
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card2);border-radius:var(--radius);margin-top:8px;border:1px solid var(--border-light);}
.tlbl{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:.2px;}
.tval{font-size:17px;font-weight:900;}

/* ── HERO CARD ─────────────────────────────────── */
.hero{
  background:linear-gradient(135deg,#1E0D03,#3D2008 50%,#261204);
  border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;top:0;right:0;width:120px;height:120px;
  background:radial-gradient(circle,rgba(201,126,8,0.15),transparent 70%);
  pointer-events:none;
}
.hname{font-size:18px;font-weight:900;color:#F5A623;letter-spacing:.2px;}
.hsub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;font-weight:500;}
.hdate{font-size:10px;color:rgba(245,166,35,0.45);margin-top:10px;font-weight:600;letter-spacing:.5px;}

/* ── EXPENSE ROWS ──────────────────────────────── */
.wrow{display:flex;gap:7px;align-items:center;margin-bottom:7px;}
.wrow .inp{margin:0;flex:1;}
.wrow .inpa{width:85px;flex:none;}
.dbtn{
  width:30px;height:30px;min-width:30px;background:#FFF5F5;
  border:1.5px solid #FFCDD2;border-radius:var(--radius-sm);
  color:var(--rl);font-size:15px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;padding:0;transition:all .12s;
}
.dbtn:active{background:#FFEBEE;transform:scale(0.9);}
.addbtn{
  display:flex;align-items:center;gap:8px;background:var(--primary-bg);
  border:1.5px dashed rgba(201,126,8,0.35);border-radius:var(--radius);
  padding:10px 14px;color:var(--primary);font-size:12px;font-weight:700;
  cursor:pointer;width:100%;margin-top:6px;transition:all .15s;
}
.addbtn:active{background:rgba(201,126,8,0.12);}

/* ── CASH FLOW ─────────────────────────────────── */
.cf-header{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-radius:var(--radius);margin-bottom:10px;}
.cf-income-header{background:linear-gradient(135deg,#F0FBF1,#E8F5E9);border:1.5px solid #C8E6C9;}
.cf-expense-header{background:linear-gradient(135deg,#FFF5F5,#FFF0F0);border:1.5px solid #FFCDD2;}
.cf-header-left{display:flex;align-items:center;gap:9px;}
.cf-header-icon{font-size:22px;}
.cf-header-title{font-size:13px;font-weight:800;}
.cf-header-val{font-size:21px;font-weight:900;}
.cf-income-header .cf-header-title{color:var(--g);}
.cf-income-header .cf-header-val{color:var(--g);}
.cf-expense-header .cf-header-title{color:var(--r);}
.cf-expense-header .cf-header-val{color:var(--r);}

.cf-auto-box{
  background:linear-gradient(135deg,#F0FBF1,#E8F5E9);
  border:1.5px solid #C8E6C9;border-radius:var(--radius);
  padding:13px 14px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.cf-auto-lbl{font-size:12px;font-weight:700;color:var(--g);}
.cf-auto-sub{font-size:10px;color:#66BB6A;margin-top:2px;font-weight:500;}
.cf-auto-val{font-size:23px;font-weight:900;color:var(--g);}

.cf-exp-item{
  background:#FFF;border:1.5px solid var(--border-light);
  border-radius:var(--radius);padding:10px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);transition:border-color .15s;
}
.cf-exp-item:focus-within{border-color:rgba(201,126,8,0.3);}
.cf-exp-row{display:flex;gap:7px;align-items:center;}
.cf-exp-row select.inp{margin:0;flex:1;}
.cf-exp-row .inpa{width:90px;flex:none;margin:0;}

/* ── BALANCE CARD ──────────────────────────────── */
.balance-card{
  border-radius:var(--radius-lg);padding:16px 20px;margin:12px 0;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow-md);
}
.balance-positive{background:linear-gradient(135deg,#145218,#1E7A2A);}
.balance-negative{background:linear-gradient(135deg,#6D0000,#B71C1C);}
.balance-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);}
.balance-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;}
.balance-amount{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px;}

/* ── PROFIT BANNER ─────────────────────────────── */
.pbanner{border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-md);}
.pb-ok{background:linear-gradient(135deg,#145218,#1E7A2A);}
.pb-no{background:linear-gradient(135deg,#6D0000,#B71C1C);}
.pblbl{font-size:11px;font-weight:600;color:rgba(255,255,255,0.75);}
.pbamt{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px;}

/* ── STAT CARDS ────────────────────────────────── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.scard{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--border-light);padding:13px 12px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.scard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--primary-l));
  opacity:0;transition:opacity .2s;
}
.scard:hover::before{opacity:1;}
.slbl{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;}
.sval{font-size:19px;font-weight:900;letter-spacing:-0.5px;}

/* ── BRANCH ITEMS ──────────────────────────────── */
.bi{
  display:flex;align-items:center;gap:11px;padding:12px 14px;
  background:#fff;border:1px solid var(--border-light);
  border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm);
  transition:box-shadow .15s,transform .12s;
}
.bi:active{transform:scale(0.98);}
.bdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px transparent;}
.bg-dot{background:#27A337;box-shadow:0 0 0 3px rgba(39,163,55,0.15);}
.by-dot{background:#F9A825;box-shadow:0 0 0 3px rgba(249,168,37,0.15);}
.bname{font-weight:700;font-size:13px;letter-spacing:-.1px;}
.bstats{font-size:10px;color:var(--dim);margin-top:2px;font-weight:500;}

/* ── SUCCESS PAGE ──────────────────────────────── */
#pg-ok{background:linear-gradient(160deg,#F0FBF1 0%,#E8F5E9 100%);align-items:center;justify-content:center;text-align:center;padding:28px;}
.ok-ico{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(39,163,55,0.3));}
.ok-t{font-size:24px;font-weight:900;color:var(--g);letter-spacing:-.3px;}
.ok-s{color:var(--dim);font-size:12px;margin-top:5px;margin-bottom:20px;line-height:1.6;}
.ok-box{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;width:100%;margin-bottom:16px;box-shadow:var(--shadow);}
.ok-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12px;font-weight:500;}
.ok-row:last-child{border:none;}

/* ── SETTINGS ──────────────────────────────────── */
.br-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
.br-table th{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 9px;text-align:left;border-bottom:2px solid var(--border);}
.br-table td{padding:8px 9px;border-bottom:1px solid var(--border-light);font-size:12px;}
.pin-inp{width:80px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;padding:7px 8px;outline:none;text-align:center;transition:border-color .2s;}
.pin-inp:focus{border-color:var(--primary);}

/* ── EXPORT BUTTONS ────────────────────────────── */
.exp-bar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0 12px;}
.btn-exp{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',inherit;transition:all .12s;}
.btn-exp:active{transform:scale(0.95);}
.btn-pdf{background:#FFF5F5;color:var(--r);border:1.5px solid #FFCDD2;}
.btn-csv{background:#F0FBF1;color:var(--g);border:1.5px solid #C8E6C9;}
.btn-gsh{background:#EEF4FF;color:var(--b);border:1.5px solid #BBDEFB;}
.selrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.inp-sm{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',inherit;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s;}
.inp-sm:focus{border-color:var(--primary);}

/* ── BAR CHART ─────────────────────────────────── */
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.bar-lbl{font-size:10px;color:var(--dim);width:72px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.bar-bg{flex:1;height:12px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--border-light);}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease;}
.bar-val{font-size:10px;color:var(--dim);width:65px;text-align:right;flex-shrink:0;font-weight:700;}

/* ── MISC ──────────────────────────────────────── */
.sep{height:1px;background:var(--border-light);margin:12px 0;}
.gap{height:28px;}
.warn{background:linear-gradient(135deg,#FFFBF0,#FFF8E1);border:1.5px solid #FFE082;border-radius:var(--radius);padding:11px 13px;margin-bottom:10px;font-size:11px;color:#B45309;font-weight:600;}
.section-title{font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 8px;}
