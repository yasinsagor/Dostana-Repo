<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#D4890A">
<title>Dostana SPEC Supplier View</title>
<style>
:root{--bg:#F7F3EE;--card:#fff;--card2:#FAF6F0;--border:#E4D9C8;--primary:#C97E08;--text:#18100A;--dim:#8A7060;--g:#1E7A2A;--r:#B71C1C;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);padding:14px;font-size:14px}.hero{background:linear-gradient(135deg,#1E0D03,#3D2008);color:#fff;border-radius:18px;padding:18px;margin-bottom:14px}.h1{font-size:22px;font-weight:900;color:#F5A623}.sub{font-size:12px;opacity:.65;margin-top:4px}.bar{display:flex;gap:8px;margin:12px 0;align-items:center;flex-wrap:wrap}.inp{flex:1;min-width:150px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:11px 12px;font:inherit}.btn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn2{background:#fff;color:var(--primary);border:1.5px solid var(--border)}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}.stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}.sv{font-size:22px;font-weight:900;color:var(--primary)}.sl{font-size:10px;text-transform:uppercase;color:var(--dim);font-weight:800;margin-top:3px}.warn{background:#FFF8E1;border:1.5px solid #FFE082;color:#92400E;border-radius:14px;padding:12px;margin-bottom:12px;font-weight:700;font-size:12px}.cat{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px}.cat-h{background:#2A1A05;color:#F5A623;padding:10px 14px;font-size:12px;font-weight:900;text-transform:uppercase}.row{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid #eee;align-items:flex-start}.row:last-child{border-bottom:none}.name{font-weight:800;font-size:14px}.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}.chip{background:#FFF4E0;border:1px solid rgba(201,126,8,.25);border-radius:6px;padding:2px 7px;font-size:10px;color:#A56506;font-weight:800}.qty{text-align:right;margin-left:auto}.q{font-size:22px;font-weight:900;color:var(--primary)}.u{font-size:10px;color:var(--dim)}.empty{text-align:center;background:#fff;border:1px solid var(--border);border-radius:16px;padding:40px 20px;color:var(--dim)}@media print{.bar,.btn{display:none}body{background:#fff}.hero{color:#111;background:#fff;border:2px solid #D4890A}.cat{break-inside:avoid}}
</style>
</head>
<body>
<div class="hero"><div class="h1">📦 Dostana SPEC Supplier</div><div class="sub">Consolidated branch orders · auto refresh every 5 min</div></div>
<div class="bar"><input class="inp" type="date" id="sel-date"><button class="btn" onclick="loadOrders()">🔄 Refresh</button><button class="btn btn2" onclick="window.print()">🖨️ Print</button></div>
<div id="app"><div class="empty">Loading...</div></div>
<script>
var SB_URL='https://acpllsoigparbwmlwbem.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGxsc29pZ3BhcmJ3bWx3YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTI4MzksImV4cCI6MjA5NDEyODgzOX0.c_4fjYsq2R70-RW6psftZv96AG3R_Kxv-IHCH-E4L70';
function h(extra){return Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},extra||{});} 
function td(){return new Date().toISOString().slice(0,10);} 
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var ALL=['Krakowskie Przedmiescie','Turystyczna','Sympatyczna','Kozubszczyzna','Ryki','Lopuszanska','Raszyn','Mlawa','Lodz','Wroclawska'];
async function loadOrders(){
 var d=document.getElementById('sel-date').value||td();
 var app=document.getElementById('app'); app.innerHTML='<div class="empty">⏳ Loading orders...</div>';
 try{
  var r=await fetch(SB_URL+'/rest/v1/spec_orders?date=eq.'+encodeURIComponent(d)+'&order=branch.asc',{headers:h()});
  if(!r.ok) throw new Error(await r.text());
  var rows=await r.json()||[];
  var prod={}, branches=new Set();
  rows.forEach(function(o){branches.add(o.branch||''); var items=o.items||[]; if(typeof items==='string'){try{items=JSON.parse(items)}catch(e){items=[]}};
    items.forEach(function(it){var key=(it.id||it.name)+'|'+(it.unit||''); if(!prod[key])prod[key]={name:it.name,unit:it.unit||'',cat:it.cat||'Other',total:0,branches:{}}; prod[key].total+=parseFloat(it.qty)||0; prod[key].branches[o.branch]=(prod[key].branches[o.branch]||0)+(parseFloat(it.qty)||0);});
  });
  var missing=ALL.filter(function(b){return !Array.from(branches).some(function(x){return String(x).toLowerCase()===b.toLowerCase();});});
  var html='<div class="stats"><div class="stat"><div class="sv">'+rows.length+'</div><div class="sl">Orders</div></div><div class="stat"><div class="sv" style="color:'+(missing.length?'var(--r)':'var(--g)')+'">'+branches.size+'/'+ALL.length+'</div><div class="sl">Branches</div></div><div class="stat"><div class="sv">'+Object.keys(prod).length+'</div><div class="sl">Products</div></div></div>';
  if(missing.length) html+='<div class="warn">⚠️ Not yet ordered: '+missing.map(esc).join(', ')+'</div>';
  if(!rows.length){app.innerHTML=html+'<div class="empty">📭 No SPEC orders for '+esc(d)+'</div>';return;}
  ['Mięso','Sosy','Oleje','Opakowania','Other'].forEach(function(cat){var items=Object.values(prod).filter(function(p){return (p.cat||'Other')===cat;}).sort(function(a,b){return b.total-a.total;}); if(!items.length)return; html+='<div class="cat"><div class="cat-h">'+esc(cat)+'</div>'; items.forEach(function(p){html+='<div class="row"><div><div class="name">'+esc(p.name)+'</div><div class="chips">'+Object.keys(p.branches).map(function(b){return '<span class="chip">'+esc(String(b).split(' ')[0])+': '+p.branches[b]+'</span>';}).join('')+'</div></div><div class="qty"><div class="q">'+p.total+'</div><div class="u">'+esc(p.unit)+'</div></div></div>';}); html+='</div>';});
  app.innerHTML=html;
 }catch(e){app.innerHTML='<div class="empty">❌ Cannot load supplier orders<br><small>'+esc(e.message)+'</small></div>';}
}
document.getElementById('sel-date').value=td(); loadOrders(); setInterval(loadOrders,300000);
</script>
</body>
</html>
