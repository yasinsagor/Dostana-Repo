<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dostana Kebab — SPEC Orders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5F0E8;color:#1C1208;font-size:14px;}
.topbar{background:linear-gradient(135deg,#2A1A05,#4A2E08);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.brand{color:#F5A623;font-size:18px;font-weight:900;letter-spacing:1px;}
.brand-sub{color:rgba(245,166,35,0.6);font-size:11px;margin-top:2px;}
.live{display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-txt{color:#fff;font-size:11px;font-weight:700;}
.date-bar{background:#fff;border-bottom:3px solid #F5A623;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.date-txt{font-size:16px;font-weight:900;}
.date-sub{font-size:11px;color:#8A7060;margin-top:2px;}
.refresh-btn{background:#FFF4E0;border:1.5px solid #F5A623;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:#D4890A;cursor:pointer;font-family:inherit;}
.container{max-width:700px;margin:0 auto;padding:12px;}
/* Summary strip */
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.s-card{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid #E8DCC8;}
.s-num{font-size:24px;font-weight:900;color:#D4890A;}
.s-lbl{font-size:10px;color:#8A7060;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
/* Branch accordion */
.branch-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid #E8DCC8;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.branch-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;}
.branch-hdr:active{background:#FFF4E0;}
.branch-left{display:flex;align-items:center;gap:10px;}
.branch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-green{background:#4CAF50;}
.dot-red{background:#EF5350;}
.branch-name{font-size:14px;font-weight:800;color:#1C1208;}
.branch-meta{font-size:11px;color:#8A7060;margin-top:2px;}
.branch-right{display:flex;align-items:center;gap:8px;}
.items-badge{background:#FFF4E0;border:1px solid rgba(212,137,10,.3);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:800;color:#D4890A;}
.chevron{font-size:18px;color:#8A7060;transition:transform .2s;}
.chevron.open{transform:rotate(90deg);}
.branch-body{display:none;border-top:1px solid #F0EBE0;}
.branch-body.open{display:block;}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #F8F5F0;}
.item-row:last-child{border:none;}
.item-name{font-size:13px;font-weight:600;}
.item-cat{font-size:10px;color:#8A7060;margin-top:1px;}
.item-qty{font-size:16px;font-weight:900;color:#D4890A;}
.item-unit{font-size:10px;color:#8A7060;}
/* Not ordered section */
.missing-card{background:#FFF8E1;border:1.5px solid #FFE082;border-radius:14px;padding:13px 16px;margin-bottom:10px;}
.missing-title{font-size:12px;font-weight:800;color:#B45309;margin-bottom:8px;}
.missing-branch{display:inline-block;background:#fff;border:1px solid #FFE082;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#92400E;margin:3px;}
/* Loading / empty */
.empty{text-align:center;padding:50px 20px;color:#8A7060;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:800;color:#2A1A05;margin-bottom:6px;}
/* Print */
.print-btn{width:100%;padding:13px;background:#D4890A;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:16px;}
@media print{
  .print-btn,.refresh-btn,.live{display:none!important;}
  body{background:#fff;}
  .branch-body{display:block!important;}
  .chevron{display:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="brand">DOSTANA KEBAB</div>
    <div class="brand-sub">SPEC — Supplier Orders</div>
  </div>
  <div class="live">
    <div class="dot" id="live-dot"></div>
    <div class="live-txt" id="live-txt">Loading...</div>
  </div>
</div>

<div class="date-bar">
  <div>
    <div class="date-txt" id="date-txt">—</div>
    <div class="date-sub" id="date-sub">Refreshes every 30 seconds</div>
  </div>
  <button class="refresh-btn" onclick="load()">🔄 Refresh</button>
</div>

<div class="container">
  <div id="content"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Loading...</div></div></div>
  <button class="print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
</div>

<script>
var SB_URL='https://acpllsoigparbwmlwbem.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjcGxsc29pZ3BhcmJ3bWx3YmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTI4MzksImV4cCI6MjA5NDEyODgzOX0.c_4fjYsq2R70-RW6psftZv96AG3R_Kxv-IHCH-E4L70';

var ALL_BRANCHES=['Krakowskie Przedmiescie','Turystyczna','Sympatyczna','Kozubszczyzna','Ryki','Lopuszanska','Raszyn','Mlawa','Lodz','Wroclawska'];

var CAT_ICONS={'Mięso i Główne':'🥩','Sosy':'🫙','Oleje i Przyprawy':'🧴','Opakowania':'📦','Inne':'📋'};

function sbHeaders(){
  return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
}

function today(){return new Date().toISOString().slice(0,10);}

function fmtDate(d){
  if(!d) return '';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dt=new Date(d+'T12:00:00');
  return dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}

function fmtFull(d){
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dt=new Date(d+'T12:00:00');
  return days[dt.getDay()]+', '+dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}

function toggle(id){
  var body=document.getElementById('body-'+id);
  var chev=document.getElementById('chev-'+id);
  if(!body) return;
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  if(chev) chev.classList.toggle('open',!open);
}

async function load(){
  var dot=document.getElementById('live-dot');
  var ltxt=document.getElementById('live-txt');
  var content=document.getElementById('content');
  var td=today();

  document.getElementById('date-txt').textContent=fmtFull(td);
  document.getElementById('date-sub').textContent='Orders for: '+td+' · Last updated: '+new Date().toLocaleTimeString();
  dot.style.background='#FFA726';
  ltxt.textContent='Refreshing...';

  try{
    var r=await fetch(
      SB_URL+'/rest/v1/spec_orders?date=eq.'+td+'&status=neq.draft&order=submitted_at.asc&limit=200',
      {headers:sbHeaders()}
    );
    if(!r.ok) throw new Error('HTTP '+r.status);
    var orders=await r.json()||[];

    dot.style.background='#4CAF50';
    ltxt.textContent=orders.length+' orders in';

    // Build branch → order map
    var branchMap={};
    orders.forEach(function(ord){
      var br=ord.branch||'Unknown';
      if(!branchMap[br]) branchMap[br]=[];
      branchMap[br].push(ord);
    });

    // Count totals
    var orderedCount=Object.keys(branchMap).length;
    var totalItems=0;
    orders.forEach(function(o){
      var items=o.items||[];
      if(typeof items==='string'){try{items=JSON.parse(items);}catch(e){items=[];}}
      totalItems+=items.length;
    });

    var missing=ALL_BRANCHES.filter(function(b){
      return!Object.keys(branchMap).some(function(k){return k.toLowerCase()===b.toLowerCase();});
    });

    // Build HTML
    var html='';

    // Summary strip
    html+='<div class="summary-strip">'
      +'<div class="s-card"><div class="s-num">'+orderedCount+'</div><div class="s-lbl">Ordered</div></div>'
      +'<div class="s-card"><div class="s-num" style="color:'+(missing.length?'#EF5350':'#4CAF50')+';">'+missing.length+'</div><div class="s-lbl">Pending</div></div>'
      +'<div class="s-card"><div class="s-num">'+totalItems+'</div><div class="s-lbl">Total Items</div></div>'
      +'</div>';

    if(!orders.length){
      html+='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No orders yet today</div><div style="font-size:13px;margin-top:6px;">Orders will appear here as branches submit them.</div></div>';
      content.innerHTML=html;
      return;
    }

    // Branches that ordered — accordion cards
    ALL_BRANCHES.forEach(function(branchName){
      // Find matching orders (case-insensitive)
      var matchKey=Object.keys(branchMap).find(function(k){return k.toLowerCase()===branchName.toLowerCase();});
      if(!matchKey) return; // not ordered yet — shown in missing section below

      var branchOrders=branchMap[matchKey];
      // Use the latest order for this branch
      var ord=branchOrders.sort(function(a,b){return(b.submitted_at||'').localeCompare(a.submitted_at||'');})[0];
      var items=ord.items||[];
      if(typeof items==='string'){try{items=JSON.parse(items);}catch(e){items=[];}}

      var submittedTime=ord.submitted_at?new Date(ord.submitted_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}):'';
      var brId=branchName.replace(/\s+/g,'_');

      html+='<div class="branch-card">';
      html+='<div class="branch-hdr" onclick="toggle(\''+brId+'\')">';
      html+='<div class="branch-left">';
      html+='<div class="branch-dot dot-green"></div>';
      html+='<div>';
      html+='<div class="branch-name">'+branchName+'</div>';
      html+='<div class="branch-meta">'+fmtDate(ord.date)+(submittedTime?' · Submitted at '+submittedTime:'')+(ord.manager?' · '+ord.manager:'')+'</div>';
      html+='</div></div>';
      html+='<div class="branch-right">';
      html+='<span class="items-badge">'+items.length+' items</span>';
      html+='<span class="chevron" id="chev-'+brId+'">›</span>';
      html+='</div></div>';

      // Dropdown body — grouped by category
      html+='<div class="branch-body" id="body-'+brId+'">';

      // Group items by category
      var catMap={};
      items.forEach(function(it){
        var cat=it.cat||'Inne';
        if(!catMap[cat]) catMap[cat]=[];
        catMap[cat].push(it);
      });

      var catOrder=['Mięso i Główne','Sosy','Oleje i Przyprawy','Opakowania','Inne'];
      catOrder.forEach(function(cat){
        if(!catMap[cat]||!catMap[cat].length) return;
        // Category header
        html+='<div style="background:#F5F0E8;padding:6px 16px;font-size:10px;font-weight:800;color:#8A7060;text-transform:uppercase;letter-spacing:.8px;">'
          +(CAT_ICONS[cat]||'📦')+' '+cat+'</div>';
        catMap[cat].forEach(function(it){
          html+='<div class="item-row">';
          html+='<div><div class="item-name">'+it.name+'</div></div>';
          html+='<div style="text-align:right;">';
          html+='<div class="item-qty">'+it.qty+'</div>';
          html+='<div class="item-unit">'+it.unit+'</div>';
          html+='</div></div>';
        });
      });

      html+='</div></div>'; // close body + card
    });

    // Missing branches
    if(missing.length){
      html+='<div class="missing-card">';
      html+='<div class="missing-title">⏳ Still waiting for '+missing.length+' branch'+(missing.length>1?'es':'')+':</div>';
      missing.forEach(function(b){
        html+='<span class="missing-branch">'+b+'</span>';
      });
      html+='</div>';
    }

    content.innerHTML=html;

  }catch(err){
    dot.style.background='#EF5350';
    ltxt.textContent='Error';
    content.innerHTML='<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">Could not load orders</div><div style="font-size:12px;color:#EF5350;margin-top:6px;">'+err.message+'</div><button onclick="load()" style="margin-top:14px;padding:10px 20px;background:#D4890A;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Retry</button></div>';
  }
}

// Load immediately
load();

// Auto-refresh every 30 seconds
setInterval(load, 30000);
</script>
</body>
</html>
